name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'library-frontend/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'library-frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: library-frontend

      - name: Build
        run: npm run build -- --base-href=/smart-library/
        working-directory: library-frontend

      - name: SPA 404 Fallback
        run: cp library-frontend/dist/library-frontend/browser/index.html library-frontend/dist/library-frontend/browser/404.html

      - name: Deploy to gh-pages Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./library-frontend/dist/library-frontend/browser
